<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiMo Dev Assistant — Dashboard</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --muted: #71717a;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --blue: #3b82f6;
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        
        .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header .status { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
        .header .status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
        .header .status.offline .dot { background: var(--red); }
        .header nav { margin-left: auto; display: flex; gap: 8px; }
        .header nav button { background: var(--border); border: none; color: var(--text); padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
        .header nav button:hover { background: var(--accent); }
        .header nav button.active { background: var(--accent); }

        .main { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
        .card h2 { font-size: 14px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .card h2 .icon { font-size: 16px; }
        
        .stat { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .stat:last-child { border-bottom: none; }
        .stat-label { font-size: 13px; color: var(--muted); }
        .stat-value { font-size: 14px; font-weight: 500; }
        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--red); }
        .stat-value.yellow { color: var(--yellow); }
        .stat-value.blue { color: var(--blue); }

        .provider { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .provider:last-child { border-bottom: none; }
        .provider .badge { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .provider .badge.active { background: var(--green); }
        .provider .badge.inactive { background: var(--red); }
        .provider .info { flex: 1; }
        .provider .name { font-size: 13px; font-weight: 500; }
        .provider .desc { font-size: 12px; color: var(--muted); }
        .provider .models { font-size: 11px; color: var(--accent); }

        .task-form { display: flex; flex-direction: column; gap: 12px; }
        .task-form textarea { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; color: var(--text); font-size: 14px; resize: vertical; min-height: 80px; font-family: inherit; }
        .task-form textarea:focus { outline: none; border-color: var(--accent); }
        .task-form .row { display: flex; gap: 8px; align-items: center; }
        .task-form select { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; color: var(--text); font-size: 13px; }
        .btn { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 500; }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn.secondary { background: var(--border); color: var(--text); }
        .btn.secondary:hover { background: #3a3d4a; }
        .btn.danger { background: var(--red); }

        .log { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; height: 400px; overflow-y: auto; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.6; }
        .log-entry { padding: 2px 0; }
        .log-entry .time { color: var(--muted); }
        .log-entry.event { color: var(--blue); }
        .log-entry.error { color: var(--red); }
        .log-entry.success { color: var(--green); }
        .log-entry .agent { color: var(--accent); font-weight: 500; }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
        .tabs button { background: transparent; border: none; color: var(--muted); padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
        .tabs button:hover { color: var(--text); }
        .tabs button.active { background: var(--border); color: var(--text); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .task-list { max-height: 300px; overflow-y: auto; }
        .task-item { padding: 10px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
        .task-item .task-header { display: flex; justify-content: space-between; align-items: center; }
        .task-item .task-id { font-size: 12px; color: var(--accent); font-family: monospace; }
        .task-item .task-status { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
        .task-item .task-status.pending { background: rgba(234, 179, 8, 0.2); color: var(--yellow); }
        .task-item .task-status.active { background: rgba(59, 130, 246, 0.2); color: var(--blue); }
        .task-item .task-status.done { background: rgba(34, 197, 94, 0.2); color: var(--green); }
        .task-item .task-status.error { background: rgba(239, 68, 68, 0.2); color: var(--red); }
        .task-item .task-desc { font-size: 13px; margin-top: 6px; }
        .task-item .task-time { font-size: 11px; color: var(--muted); margin-top: 4px; }

        .memory-list { max-height: 300px; overflow-y: auto; }
        .memory-item { padding: 10px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; font-size: 13px; }
        .memory-item .key { color: var(--accent); font-family: monospace; font-size: 12px; }
        .memory-item .value { color: var(--muted); margin-top: 4px; white-space: pre-wrap; word-break: break-word; }

        .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 20px; }

        @media (max-width: 768px) {
            .main { padding: 16px; }
            .grid { grid-template-columns: 1fr; }
            .header { flex-wrap: wrap; }
            .header nav { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>MiMo Dev Assistant</h1>
        <div class="status" id="serverStatus">
            <span class="dot"></span>
            <span id="statusText">Подключение...</span>
        </div>
        <nav>
            <button class="active" onclick="showTab('overview')">Обзор</button>
            <button onclick="showTab('tasks')">Задачи</button>
            <button onclick="showTab('memory')">Память</button>
            <button onclick="showTab('logs')">Логи</button>
        </nav>
    </div>

    <div class="main">
        <!-- Overview Tab -->
        <div class="tab-content active" id="tab-overview">
            <div class="grid">
                <!-- Stats Card -->
                <div class="card">
                    <h2><span class="icon">&#9881;</span> Статистика</h2>
                    <div class="stat">
                        <span class="stat-label">Всего задач</span>
                        <span class="stat-value blue" id="statTotal">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Активных</span>
                        <span class="stat-value" id="statActive">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Завершено</span>
                        <span class="stat-value green" id="statDone">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Ошибок</span>
                        <span class="stat-value red" id="statErrors">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Сессий</span>
                        <span class="stat-value" id="statSessions">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Записей памяти</span>
                        <span class="stat-value" id="statMemory">0</span>
                    </div>
                </div>

                <!-- Providers Card -->
                <div class="card">
                    <h2><span class="icon">&#9889;</span> Провайдеры</h2>
                    <div id="providersList">
                        <div class="empty">Загрузка...</div>
                    </div>
                </div>

                <!-- Agents Card -->
                <div class="card">
                    <h2><span class="icon">&#129302;</span> Агенты</h2>
                    <div id="agentsList">
                        <div class="empty">Загрузка...</div>
                    </div>
                </div>

                <!-- Health Card -->
                <div class="card">
                    <h2><span class="icon">&#128200;</span> Система</h2>
                    <div id="healthInfo">
                        <div class="empty">Загрузка...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tasks Tab -->
        <div class="tab-content" id="tab-tasks">
            <div class="grid" style="grid-template-columns: 1fr 2fr;">
                <!-- Submit Task -->
                <div class="card">
                    <h2><span class="icon">&#10133;</span> Новая задача</h2>
                    <form class="task-form" id="taskForm">
                        <textarea id="taskPrompt" placeholder="Опишите задачу..."></textarea>
                        <div class="row">
                            <select id="taskEngine">
                                <option value="hermes-cli">Hermes CLI</option>
                                <option value="hermes">Hermes Direct</option>
                                <option value="codex">Codex</option>
                                <option value="claude">Claude Code</option>
                                <option value="mimo">MiMo</option>
                            </select>
                            <button type="submit" class="btn" id="submitBtn">Отправить</button>
                        </div>
                    </form>
                </div>

                <!-- Task List -->
                <div class="card">
                    <h2><span class="icon">&#128203;</span> История задач</h2>
                    <div class="task-list" id="taskList">
                        <div class="empty">Нет задач</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Memory Tab -->
        <div class="tab-content" id="tab-memory">
            <div class="card">
                <h2><span class="icon">&#128218;</span> Persistent Memory</h2>
                <div class="memory-list" id="memoryList">
                    <div class="empty">Нет записей</div>
                </div>
            </div>
        </div>

        <!-- Logs Tab -->
        <div class="tab-content" id="tab-logs">
            <div class="card">
                <h2 style="display: flex; justify-content: space-between; align-items: center;">
                    <span><span class="icon">&#128196;</span> Логи (SSE)</span>
                    <button class="btn secondary" onclick="clearLogs()">Очистить</button>
                </h2>
                <div class="log" id="logContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const API = `http://${window.location.hostname}:3001`;
        let eventSource = null;
        let currentTab = 'overview';

        // Tab switching
        function showTab(name) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.header nav button').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${name}`).classList.add('active');
            document.querySelector(`.header nav button[onclick="showTab('${name}')"]`).classList.add('active');
            currentTab = name;
            
            if (name === 'tasks') loadTasks();
            if (name === 'memory') loadMemory();
        }

        // Health check
        async function checkHealth() {
            try {
                const res = await fetch(`${API}/health`);
                const data = await res.json();
                document.getElementById('serverStatus').classList.remove('offline');
                document.getElementById('statusText').textContent = `Подключено · ${data.model} · ${data.builderEngine}`;
                
                // Update health info
                document.getElementById('healthInfo').innerHTML = `
                    <div class="stat">
                        <span class="stat-label">Проект</span>
                        <span class="stat-value" style="font-size:12px">${data.projectDir}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Модель</span>
                        <span class="stat-value green">${data.model}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Движок</span>
                        <span class="stat-value blue">${data.builderEngine}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Hermes</span>
                        <span class="stat-value" style="font-size:12px">${data.hermesUrl}</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Данные</span>
                        <span class="stat-value" style="font-size:12px">${data.dataDir}</span>
                    </div>
                `;
            } catch (e) {
                document.getElementById('serverStatus').classList.add('offline');
                document.getElementById('statusText').textContent = 'Offline';
            }
        }

        // Load stats
        async function loadStats() {
            try {
                const res = await fetch(`${API}/v1/tasks`);
                const data = await res.json();
                const stats = data.stats || {};
                
                document.getElementById('statTotal').textContent = stats.total || 0;
                document.getElementById('statActive').textContent = stats.active || 0;
                document.getElementById('statDone').textContent = stats.completed || 0;
                document.getElementById('statErrors').textContent = stats.failed || 0;

                // Tasks list
                const tasks = data.tasks || [];
                if (tasks.length > 0) {
                    document.getElementById('taskList').innerHTML = tasks.slice(-20).reverse().map(t => `
                        <div class="task-item">
                            <div class="task-header">
                                <span class="task-id">${t.id}</span>
                                <span class="task-status ${t.status}">${t.status}</span>
                            </div>
                            <div class="task-desc">${escHtml(t.description || t.summary || '')}</div>
                            <div class="task-time">${t.createdAt ? new Date(t.createdAt).toLocaleString() : ''}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }

        // Load providers
        async function loadProviders() {
            try {
                const res = await fetch(`${API}/v1/providers`);
                const data = await res.json();
                
                document.getElementById('providersList').innerHTML = data.providers.map(p => `
                    <div class="provider">
                        <span class="badge ${p.available ? 'active' : 'inactive'}"></span>
                        <div class="info">
                            <div class="name">${escHtml(p.name)}</div>
                            <div class="desc">${escHtml(p.description)}</div>
                            ${p.models ? `<div class="models">${p.models.join(', ')}</div>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (e) {}
        }

        // Load agents
        async function loadAgents() {
            try {
                const res = await fetch(`${API}/v1/agents`);
                const data = await res.json();
                
                document.getElementById('agentsList').innerHTML = data.agents.map(a => `
                    <div class="provider">
                        <span class="badge active"></span>
                        <div class="info">
                            <div class="name">${escHtml(a.name)} ${a.name === data.builderEngine ? '<span style="color:var(--green);font-size:11px">[BUILD]</span>' : ''}</div>
                            <div class="desc">${escHtml(a.description)}</div>
                            <div class="models">${a.tools.join(', ')}</div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {}
        }

        // Load tasks
        async function loadTasks() {
            await loadStats();
        }

        // Load memory
        async function loadMemory() {
            try {
                const res = await fetch(`${API}/v1/memory`);
                const data = await res.json();
                const entries = data.entries || [];
                
                document.getElementById('statMemory').textContent = entries.length;

                if (entries.length === 0) {
                    document.getElementById('memoryList').innerHTML = '<div class="empty">Нет записей</div>';
                    return;
                }

                document.getElementById('memoryList').innerHTML = entries.map(e => `
                    <div class="memory-item">
                        <div class="key">${escHtml(e.key)}</div>
                        <div class="value">${escHtml(typeof e.value === 'object' ? JSON.stringify(e.value, null, 2) : String(e.value))}</div>
                    </div>
                `).join('');
            } catch (e) {}
        }

        // Load sessions
        async function loadSessions() {
            try {
                const res = await fetch(`${API}/v1/sessions`);
                const data = await res.json();
                document.getElementById('statSessions').textContent = (data.sessions || []).length;
            } catch (e) {}
        }

        // SSE connection
        function connectSSE() {
            if (eventSource) eventSource.close();
            
            // We use POST for SSE, but browser EventSource only supports GET
            // So we'll poll logs instead, or use fetch with ReadableStream
            addLog('event', 'SSE: Используется poll-mode (POST SSE не поддерживается браузером)');
        }

        // Submit task
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = document.getElementById('taskPrompt').value.trim();
            if (!prompt) return;

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Выполняется...';

            addLog('event', `Отправка: "${prompt.slice(0, 80)}..."`);

            try {
                const res = await fetch(`${API}/v1/process`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt,
                        options: {
                            engine: document.getElementById('taskEngine').value
                        }
                    })
                });

                const data = await res.json();
                
                if (data.error) {
                    addLog('error', `Ошибка: ${data.error}`);
                } else {
                    addLog('success', `Завершено: ${JSON.stringify(data).slice(0, 200)}`);
                }

                document.getElementById('taskPrompt').value = '';
                loadStats();
            } catch (err) {
                addLog('error', `Ошибка сети: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Отправить';
            }
        });

        // Log helpers
        function addLog(type, text) {
            const container = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="time">${time}</span> ${escHtml(text)}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            
            // Keep max 500 entries
            while (container.children.length > 500) {
                container.removeChild(container.firstChild);
            }
        }

        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
        }

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // Init
        async function init() {
            await checkHealth();
            await Promise.all([loadStats(), loadProviders(), loadAgents(), loadSessions()]);
            
            // Refresh every 10s
            setInterval(() => {
                checkHealth();
                loadStats();
            }, 10000);
        }

        init();
        connectSSE();
    </script>
</body>
</html>
